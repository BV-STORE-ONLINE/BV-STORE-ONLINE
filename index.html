<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BV STORE ONLINE</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">

    <div class="logo-container">
        <img src="img/logo.png" alt="logo">
        <h1>BV STORE ONLINE</h1>
    </div>

    <div class="cart">
        <img src="img/cart.png" alt="carrito">
        <span id="cart-count">0</span>
    </div>

</header>

<!-- ================= HERO ================= -->
<section class="hero">

    <div class="hero-img">
        <img src="img/imagen-baner.jpg" alt="banner">
    </div>

    <a href="#productos" class="btn-banner">
        Compra ahora
    </a>

</section>

<!-- ================= PRODUCTOS ================= -->
<section id="productos" class="productos">
    <h2>Nuestras Camisas</h2>
    <p>Aquí irán todas las camisas...</p>
</section>

<!-- ================= JS ================= -->
<script src="script.js"></script>

</body>
</html>
