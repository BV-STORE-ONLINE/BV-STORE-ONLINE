<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BV STORE ONLINE</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">

    <!-- LOGO -->
    <div class="logo-container">
        <img src="img/logo.png" alt="logo">
        <h1>BV STORE ONLINE</h1>
    </div>

    <!-- CARRITO CON IMAGEN -->
    <div class="cart">
        <img src="img/cart.png" alt="carrito">
        <span id="cart-count">0</span>
    </div>

</header>


<!-- ================= HERO ================= -->
<section class="hero">

    <!-- TEXTO PRINCIPAL -->
    <div class="hero-text">
        <h2>
            LA MEJOR CALIDAD<br>
            EN OVERSIZE<br>
            DE EL SALVADOR
        </h2>

        <a href="https://wa.me/503XXXXXXXX?text=Hola%20quiero%20consultar%20su%20catalogo"
           class="btn">
           Escribir por WhatsApp
        </a>
    </div>

    <!-- BANNER -->
    <div class="hero-img">
        <img src="img/imagen-baner.jpg" alt="banner">
    </div>

</section>


<!-- ================= JS ================= -->
<script src="script.js"></script>

</body>
</html>
