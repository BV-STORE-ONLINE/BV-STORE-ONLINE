<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BV STORE ONLINE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
    
    <div class="logo-container">
        <img src="img/logo.png" alt="logo">
        <h1>BV STORE ONLINE</h1>
    </div>

    <div class="cart">
        🛒 <span id="cart-count">0</span>
    </div>

</header>

<!-- HERO -->
<section class="hero">
    
    <div class="hero-text">
        <h2>LA MEJOR CALIDAD EN OVERSIZE DE EL SALVADOR</h2>
        
        <a href="https://wa.me/503XXXXXXXX?text=Hola%20quiero%20consultar%20su%20catalogo" 
           class="btn">
           Escribir por WhatsApp
        </a>
    </div>

    <div class="hero-img">
        <img src="img/imagen-baner.jpg" alt="banner">
    </div>

</section>

<!-- PRODUCTOS -->
<section class="productos">

    <h2>Productos</h2>

    <div class="producto">
        <img src="img/camisa1.jpg" alt="camisa">
        <h3>Camisa Oversize 1</h3>
        <button onclick="addToCart()">Agregar al carrito</button>
    </div>

    <div class="producto">
        <img src="img/camisa2.jpg" alt="camisa">
        <h3>Camisa Oversize 2</h3>
        <button onclick="addToCart()">Agregar al carrito</button>
    </div>

</section>

<script src="script.js"></script>
</body>
</html>
